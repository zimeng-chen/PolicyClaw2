name: 政策爬虫（单日补跑）

on:
  workflow_dispatch:
    inputs:
      crawl_date:
        description: '补跑日期（YYYY-MM-DD）'
        required: true
        type: string
      crawler_files:
        description: '指定爬虫文件（留空运行全部；多个用英文逗号分隔）'
        required: false
        default: ''
        type: string
      enable_supabase_write:
        description: '是否写入 Supabase'
        required: false
        default: true
        type: boolean
      enable_api_push:
        description: '是否推送 API'
        required: false
        default: true
        type: boolean
      enable_feishu_notify:
        description: '是否推送飞书结果提醒'
        required: false
        default: true
        type: boolean
      verbose_crawler_log:
        description: '是否输出每个爬虫的原始日志'
        required: false
        default: false
        type: boolean

jobs:
  crawl:
    uses: ./.github/workflows/crawler-common.yml
    with:
      crawl_mode: single_date
      crawl_date: ${{ inputs.crawl_date }}
      crawler_files: ${{ inputs.crawler_files }}
      enable_supabase_write: ${{ inputs.enable_supabase_write }}
      enable_api_push: ${{ inputs.enable_api_push }}
      enable_feishu_notify: ${{ inputs.enable_feishu_notify }}
      verbose_crawler_log: ${{ inputs.verbose_crawler_log }}
    secrets: inherit
