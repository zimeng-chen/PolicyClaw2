name: 政策爬虫（日常滑动窗口）

on:
  # schedule:
  #   - cron: '0 19 * * *'
  #   - cron: '0 22 * * *'
  #   - cron: '0 4 * * *'
  workflow_dispatch:
    inputs:
      crawl_window_days:
        description: '滑动窗口天数'
        required: true
        default: '7'
        type: string
      crawler_files:
        description: '指定爬虫文件（留空运行全部；多个用英文逗号分隔）'
        required: false
        default: ''
        type: string
      enable_supabase_write:
        description: '是否写入 Supabase'
        required: false
        default: true
        type: boolean
      enable_api_push:
        description: '是否推送 API'
        required: false
        default: true
        type: boolean
      enable_feishu_notify:
        description: '是否推送飞书结果提醒'
        required: false
        default: true
        type: boolean
      verbose_crawler_log:
        description: '是否输出每个爬虫的原始日志'
        required: false
        default: false
        type: boolean

jobs:
  crawl:
    uses: ./.github/workflows/crawler-common.yml
    with:
      crawl_mode: sliding_window
      crawl_window_days: ${{ inputs.crawl_window_days || '7' }}
      crawler_files: ${{ inputs.crawler_files || '' }}
      enable_supabase_write: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_supabase_write }}
      enable_api_push: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_api_push }}
      enable_feishu_notify: ${{ github.event_name != 'workflow_dispatch' || inputs.enable_feishu_notify }}
      verbose_crawler_log: ${{ inputs.verbose_crawler_log || false }}
    secrets: inherit
